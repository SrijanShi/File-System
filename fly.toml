# fly.toml app configuration file generated for filesystem-srijan on 2026-04-18

app = 'filesystem-srijan'
primary_region = 'sin'

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "uploads_vol"
  destination = "/app/uploads"
  initial_size = "1gb"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
